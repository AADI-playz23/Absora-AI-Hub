name: Absora Colab T4 Session Launcher

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Unique Session ID'
        required: true
        default: 'colab-t4-session'
      model_id:
        description: 'Target Model ID'
        required: true
        default: 'qwen2.5-1.5b'
      hf_id:
        description: 'HuggingFace Model Path'
        required: true
        default: 'Qwen/Qwen2.5-1.5B-Instruct'
      vram_gb:
        description: 'VRAM requirement in GB'
        required: true
        default: '3.0'
      webhook_url:
        description: 'Cloudflare Worker Webhook URL'
        required: true

jobs:
  launch-colab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Selenium & Automation Tools
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager requests colab-xterm

      - name: Launch Colab T4 Worker via Selenium
        env:
          COLAB_EMAIL: ${{ secrets.COLAB_EMAIL }}
          COLAB_PASS: ${{ secrets.COLAB_PASS }}
          SESSION_ID: ${{ github.event.inputs.session_id }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
          HF_ID: ${{ github.event.inputs.hf_id }}
          VRAM_GB: ${{ github.event.inputs.vram_gb }}
          WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        run: |
          python scripts/launch_colab.py

      - name: Keep-Alive Runner (Colab 2-Hour Window)
        run: |
          echo "Keeping GitHub Actions runner active for session execution window..."
          sleep 7200 || true
