name: Absora Kaggle T4x2 GPU Session Launcher

on:
  workflow_dispatch:
    inputs:
      session_id:
        description: 'Unique Session ID'
        required: true
        default: 'kaggle-t4x2-session'
      model_id:
        description: 'Target Model ID'
        required: true
        default: 'qwen2.5-7b'
      hf_id:
        description: 'HuggingFace Model Path'
        required: true
        default: 'Qwen/Qwen2.5-7B-Instruct'
      vram_gb:
        description: 'VRAM requirement in GB'
        required: true
        default: '14.0'
      webhook_url:
        description: 'Vercel / Cloudflare Worker Webhook URL'
        required: true
        default: 'https://absora-ai-hub.vercel.app/api/webhook'

jobs:
  launch-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle API & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install kaggle requests

      - name: Launch Kaggle T4x2 GPU Kernel
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME || 'aadiplayz23' }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY || 'bb278d87c316904717bfc8673419311f' }}
          SESSION_ID: ${{ github.event.inputs.session_id }}
          MODEL_ID: ${{ github.event.inputs.model_id }}
          HF_ID: ${{ github.event.inputs.hf_id }}
          VRAM_GB: ${{ github.event.inputs.vram_gb }}
          WEBHOOK_URL: ${{ github.event.inputs.webhook_url }}
        run: |
          python scripts/launch_kaggle.py

      - name: Keep-Alive Runner Monitor
        run: |
          echo "GitHub Actions monitoring Kaggle cluster execution session window..."
          sleep 1800 || true
